<div class="login-page">
  <mat-card class="login-card">

    <mat-card-header>
      <div class="logo-section">
        <img src="assets/logo.png" alt="FocusKids" class="logo" onerror="this.style.display='none'">
        <h1 class="app-title">FocusKids</h1>
        <p class="app-subtitle">Plataforma de aprendizaje adaptativo</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="usuario@ejemplo.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">El correo es requerido</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Ingrese un correo válido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password"
                 [type]="hidePassword ? 'password' : 'text'">
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">La contraseña es requerida</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Mínimo 8 caracteres</mat-error>
        </mat-form-field>

        <div class="error-msg" *ngIf="errorMsg">
          <mat-icon>error_outline</mat-icon>
          {{ errorMsg }}
        </div>

        <button mat-raised-button color="primary" type="submit"
                class="full-width submit-btn"
                [disabled]="form.invalid || loading">
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          <span *ngIf="!loading">Iniciar sesión</span>
        </button>

      </form>
    </mat-card-content>

  </mat-card>
</div>
